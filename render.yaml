# Render.com deployment configuration
# Deploy this app for free at https://render.com

services:
  - type: web
    name: draw-odds-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.com  # Update after deploying frontend
    disk:
      name: db
      mountPath: /data
      sizeGB: 1

  - type: web
    name: draw-odds-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://draw-odds-api.onrender.com
